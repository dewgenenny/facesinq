apiVersion: apps/v1
kind: Deployment
metadata:
  name: facesinq
  labels:
    app: facesinq
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: facesinq
  template:
    metadata:
      labels:
        app: facesinq
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: facesinq
        image: ghcr.io/dewgenenny/facesinq:sha-04c1eb9
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /data
        - name: tmp
          mountPath: /tmp
        env:
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          value: "sqlite:////data/facesinq.db"
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: facesinq-secrets
              key: SLACK_BOT_TOKEN
        - name: SLACK_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: facesinq-secrets
              key: SLACK_SIGNING_SECRET
        - name: CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: facesinq-secrets
              key: CLIENT_ID
        - name: CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: facesinq-secrets
              key: CLIENT_SECRET
        - name: REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: facesinq-secrets
              key: REDIRECT_URI
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: facesinq-secrets
              key: ENCRYPTION_KEY
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: facesinq-pvc
      - name: tmp
        emptyDir: {}
      tolerations:
      - key: "country"
        operator: "Equal"
        value: "de"
        effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - kube-node-1
                - kube-node-2
