[tool.ruff]
line-length = 100
target-version = "py39"
exclude = [
    "alembic/",
    "scripts/",
    "quiz_app.py",
    "create_encryption_key.py",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "T201"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=. --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "scripts/*",
    "alembic/*",
    "quiz_app.py",
    "create_encryption_key.py",
]

[tool.coverage.report]
fail_under = 80
exclude_lines = [
    "if __name__ == .__main__.:",
    "pragma: no cover",
]
