name: Docker

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///tests/test_facesinq.db
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          SLACK_BOT_TOKEN: xoxb-test-token
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          CLIENT_ID: test_client_id
          CLIENT_SECRET: test_client_secret
          REDIRECT_URI: http://localhost/oauth
        run: pytest

  build:
    needs: quality
    runs-on: ubuntu-latest
    # Only build and push on pushes to master or tags — not on PRs
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.3.0
        with:
          cosign-release: 'v2.2.2'

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Update Deployment Image
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD)"
          sed -i "s|image: .*|image: $NEW_IMAGE|g" k8s/deployment.yaml
          git add k8s/deployment.yaml
          git commit -m "Update deployment image to $NEW_IMAGE"
          git push
